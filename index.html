<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ScriptFlow</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HOME -->
<div id="home" class="screen">
  <div class="home-header">
    <div class="logo">SF</div>
    <div class="title">ScriptFlow</div>
  </div>

  <div id="projects" class="grid"></div>

  <button class="main-btn" onclick="createProject()">+ New Project</button>
</div>

<!-- PROJECT -->
<div id="projectScreen" class="screen hidden">

  <div class="header">
    <button onclick="goHome()">←</button>
    <span id="projectTitle"></span>
  </div>

  <div class="bars-container">
    <div id="workspaceBars" class="bars"></div>
  </div>

  <button class="main-btn" onclick="createWorkspace()">+ Workspace</button>

</div>

<!-- WORKSPACE -->
<div id="workspaceScreen" class="hidden">

  <div class="app">

    <div class="sidebar">
      <button onclick="goProject()">←</button>
      <button onclick="addScene()">📄</button>
    </div>

    <div class="main">

      <div class="topbar" id="workspaceTitle"></div>

      <div class="workspace-body">

        <div id="scenes" class="explorer"></div>

        <div class="editor-container">
          <div id="editor" contenteditable="true"></div>

          <div id="toolbar" class="toolbar hidden">
            <button onclick="wrapEntity()">Entity</button>
          </div>
        </div>

      </div>

    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
